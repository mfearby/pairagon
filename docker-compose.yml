services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: standup
      POSTGRES_USER: standup
      POSTGRES_PASSWORD: standup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U standup -d standup"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      PAIRAGON_DATASOURCE_URL: jdbc:postgresql://postgres:5432/standup
      PAIRAGON_DATASOURCE_USERNAME: standup
      PAIRAGON_DATASOURCE_PASSWORD: standup
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
