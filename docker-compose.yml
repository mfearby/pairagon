services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: standup
      POSTGRES_USER: standup
      POSTGRES_PASSWORD: standup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/standup
      SPRING_DATASOURCE_USERNAME: standup
      SPRING_DATASOURCE_PASSWORD: standup
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
