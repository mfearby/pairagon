spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/standup}
    username: ${SPRING_DATASOURCE_USERNAME:standup}
    password: ${SPRING_DATASOURCE_PASSWORD:standup}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.standup: DEBUG
